<!DOCTYPE html>
<html lang="en">
<head>    
  <meta charset="UTF-8">    
  <meta name="viewport" content="width=device-width, initial-scale=1.0">    
  <title>ALIENT • FOUNDING FORM</title>   
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>    
    * { box-sizing: border-box; }    
    body {
      padding-top: 90px;                
      margin: 0;        
      min-height: 100vh;         
      display: flex;        
      flex-direction: column;        
      justify-content: center;        
      align-items: center;        
      background-color: #f0f2f5;        
      font-family: sans-serif;        
      padding: 20px;         
      border: 10px solid #4F4FFF;         
      background-color: #4F4FFF;                        
      background-image: url('IMG_0171.png');        
      background-size: cover;             
      background-position: center;        
      background-repeat: no-repeat;            
      background-attachment: fixed;         
      padding-bottom: 120px;    /* ← keeps footer at true bottom */
    }    

    /* TOP NAV - exact copy */
    .top-nav {    
      position: fixed; 
      top: 0;   
      left: 0;    
      width: 100%;    
      height: 70px;    
      background-color: #4F4FFF;  
      color: #fff;        
      display: flex;    
      justify-content: space-between; 
      align-items: center;    
      padding: 0 5%; 
      box-sizing: border-box;    
      z-index: 1000; 
    }    
    .logo {
      font-weight: 800;        
      font-size: 1.5rem;        
      letter-spacing: 2px;    
    }    
    .nav-btn {    
      background-color: transparent;    
      color: #fff;    
      border: 1px solid #fff;    
      padding: 8px 16px;    
      font-size: 0.8rem;    
      font-weight: bold;    
      cursor: pointer;    
      transition: 0.3s;    
      text-decoration: none; 
      display: inline-block;
    }    
    .nav-btn:hover {    
      background-color: #fff;    
      color: #4F4FFF;    
    }    

    /* WIREFRAME CARD - exact copy + extra bottom margin */
    .wireframe-card {            
      border: 10px solid #FF0000; 
      padding: 40px;            
      display: flex;            
      flex-direction: column;            
      align-items: center;            
      text-align: center;                        
      width: 100%;            
      max-width: 500px; 
      border-radius: 8px; 
      background-color: #1F1FFF; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);    
      margin-bottom: 80px;   
    }    

    h1 {
      color: #FFFFFF;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    /* Form styling - matches your button & card */
    .form-group {
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      color: #fff;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 1rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid #FF0000;
      background-color: #fff;
      color: #000;
      font-size: 1rem;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 15px 20px;
      font-size: 1.1rem;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4F4FFF;
      color: #fff;
      transition: transform 0.2s, background-color 0.2s;
      margin-top: 20px;
    }
    .btn:hover {
      background-color: #333;
      transform: scale(1.02);
    }
    .btn:active {
      transform: scale(0.98);
    }

    /* Footer - exact copy */
    .footer {        
        position: absolute; 
        bottom: 0;        
        left: 0;        
        width: 100%;            
        background-color: #4F4FFF; 
        color: #fff;           
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 15px; 
        padding: 20px 0;       
        font-size: 0.8rem;        
        letter-spacing: 1px;        
        font-weight: bold;
    }

    .social-links {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }

    .social-links a {
        color: #fff;
        font-size: 1.5rem;
        text-decoration: none;
        transition: color 0.3s ease, transform 0.2s ease;
    }

    .social-links a:hover {
        color: #1F1FFF;
        transform: scale(1.1);
    }

    /* Status message */
    .status {
      margin-top: 20px;
      font-weight: bold;
      min-height: 24px;
      color: #fff;
    }
  </style>
</head>
<body>    
  <!-- Same top nav -->
  <nav class="top-nav">        
    <div class="logo">ALIENT</div>               
    <a href="index.html" class="nav-btn">← BACK TO HOME</a>    
  </nav>    

  <!-- Same wireframe card -->
  <div class="wireframe-card">        
    <h1>FOUNDING FORM</h1>              

    <form id="foundingForm" style="width:100%; max-width:400px;">
      <div class="form-group">
        <label>X ACCOUNT OR USERNAME <span style="color:#FF0000">*</span></label>
        <input type="text" id="x_account" placeholder="@yourhandle" required>
      </div>

      <div class="form-group">
        <label>INSTAGRAM ACCOUNT OR USERNAME</label>
        <input type="text" id="instagram_account" placeholder="@alient315">
      </div>

      <div class="form-group">
        <label>MONAD WALLET ADDRESS</label>
        <input type="text" id="monad_wallet" placeholder="0x...">
      </div>

      <div class="form-group">
        <label>DO YOU FOLLOW US ON X, IG, TIKTOK, DISCORD?</label>
        <select id="follows_us">
          <option value="">Select</option>
          <option value="YES">YES</option>
          <option value="NO">NO</option>
        </select>
      </div>

      <button type="submit" class="btn">SUBMIT TO SUPABASE →</button>
    </form>

    <div id="status" class="status"></div>
  </div>    

  <!-- Same footer -->
  <footer class="footer">
    <div class="social-links">
      <a href="#" target="_blank" aria-label="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="#" target="_blank" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
      <a href="#" target="_blank" aria-label="Telegram"><i class="fa-brands fa-telegram"></i></a>
      <a href="#" target="_blank" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </footer>

  <script>
    // ←←← REPLACE THESE WITH YOUR REAL SUPABASE KEYS
    const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJ...';

    document.getElementById('foundingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.innerHTML = 'TRANSMITTING TO THE VOID...';

      const data = {
        x_account: document.getElementById('x_account').value.trim(),
        instagram_account: document.getElementById('instagram_account').value.trim(),
        monad_wallet: document.getElementById('monad_wallet').value.trim(),
        follows_us: document.getElementById('follows_us').value
      };

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/form_responses`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          status.innerHTML = '✅ SIGNAL LOCKED.<br>Your data is now part of the swarm.<br>Airdrop queued on Monad!';
          e.target.reset();
        } else {
          status.innerHTML = '❌ Transmission failed. Try again.';
        }
      } catch (err) {
        status.innerHTML = '❌ Void interference. Check console.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
