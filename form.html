<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALIEN TECHNOLOGY • SIGNAL RECEIVED</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=VT323&display=swap');
    body {
      background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
      background-image: linear-gradient(rgba(255,165,0,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,165,0,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      font-family: 'VT323', monospace;
    }
    .neon-text { text-shadow: 0 0 10px #ff9900, 0 0 20px #ff9900; }
    .panel {
      background: rgba(15, 15, 30, 0.95);
      border: 2px solid #ff9900;
      box-shadow: 0 0 30px rgba(255, 153, 0, 0.6);
    }
    .signal { animation: signal-pulse 2s infinite; }
    @keyframes signal-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body class="min-h-screen text-[#ffcc66] flex items-center justify-center p-6 overflow-hidden">
  <div class="max-w-2xl w-full panel rounded-3xl p-10 relative">
    <!-- Header matching your index style -->
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-satellite-dish text-4xl signal"></i>
        <h1 class="text-5xl tracking-widest neon-text">SIGNAL RECEIVED</h1>
      </div>
      <a href="index.html" class="text-sm hover:text-white transition flex items-center gap-1">
        ← BACK TO VOID
      </a>
    </div>

    <form id="alienForm" class="space-y-8">
      <div>
        <label class="block text-xl mb-2">MONAD WALLET ADDRESS <span class="text-red-500">*</span></label>
        <input type="text" id="monad_wallet" required placeholder="0x..." 
          class="w-full bg-black border border-[#ff9900] rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-white font-mono">
      </div>

      <div>
        <label class="block text-xl mb-2">@X HANDLE</label>
        <input type="text" id="x_handle" placeholder="@alient315"
          class="w-full bg-black border border-[#ff9900] rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-white">
      </div>

      <div>
        <label class="block text-xl mb-2">EMAIL (OPTIONAL)</label>
        <input type="email" id="email"
          class="w-full bg-black border border-[#ff9900] rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-white">
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-xl mb-2">FAVORITE DEVICE</label>
          <select id="favorite_device" class="w-full bg-black border border-[#ff9900] rounded-2xl px-6 py-4 text-lg">
            <option value="">Select...</option>
            <option value="Tractor Beam">Tractor Beam</option>
            <option value="Gravity Inverter">Gravity Inverter</option>
            <option value="Quantum Harvester">Quantum Harvester</option>
            <option value="Orbit Shifter">Orbit Shifter</option>
            <option value="Signal Disruptor">Signal Disruptor</option>
          </select>
        </div>
        <div>
          <label class="block text-xl mb-2">FAVORITE SPACE OBJECT</label>
          <select id="favorite_object" class="w-full bg-black border border-[#ff9900] rounded-2xl px-6 py-4 text-lg">
            <option value="">Select...</option>
            <option value="Rogue Asteroid">Rogue Asteroid</option>
            <option value="Alien Probe">Alien Probe</option>
            <option value="Fractured Planet Core">Fractured Planet Core</option>
            <option value="Cosmic Anomaly">Cosmic Anomaly</option>
            <option value="Signal Relay Satellite">Signal Relay Satellite</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xl mb-2">FEEDBACK FOR THE SWARM</label>
        <textarea id="feedback" rows="4" placeholder="How can we make the void better?"
          class="w-full bg-black border border-[#ff9900] rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-white"></textarea>
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-[#ff9900] to-[#ffcc66] hover:from-[#ffcc66] hover:to-[#ff9900] text-black font-bold text-2xl py-6 rounded-2xl transition transform hover:scale-105 flex items-center justify-center gap-3">
        <i class="fa-solid fa-rocket"></i>
        DEPLOY TO SUPABASE
      </button>
    </form>

    <div id="status" class="mt-6 text-center text-sm hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ←←← REPLACE THESE TWO LINES WITH YOUR SUPABASE KEYS
    const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJ...';

    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('alienForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.classList.remove('hidden');
      status.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> TRANSMITTING TO THE VOID...`;

      const data = {
        monad_wallet: document.getElementById('monad_wallet').value.trim(),
        x_handle: document.getElementById('x_handle').value.trim(),
        email: document.getElementById('email').value.trim(),
        favorite_device: document.getElementById('favorite_device').value,
        favorite_object: document.getElementById('favorite_object').value,
        feedback: document.getElementById('feedback').value.trim()
      };

      const { error } = await supabase.from('form_responses').insert([data]);

      if (error) {
        status.innerHTML = `❌ TRANSMISSION FAILED<br><span class="text-red-400">${error.message}</span>`;
      } else {
        status.innerHTML = `✅ SIGNAL LOCKED.<br>Thank you, commander.<br>Your airdrop is queued on Monad.`;
        e.target.reset();
        setTimeout(() => status.classList.add('hidden'), 6000);
      }
    });
  </script>
</body>
</html>
